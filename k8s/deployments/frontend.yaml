apiVersion: apps/v1
kind: Deployment
metadata:
  name: brass-frontend
  namespace: brass-export
  labels:
    app: brass-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brass-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: brass-frontend
    spec:
      containers:
        - name: frontend
          image: brass-export/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.brassexport.ai"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.brassexport.ai"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
