apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: brass-api-hpa
  namespace: brass-export
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: brass-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: brass-worker-ingest-hpa
  namespace: brass-export
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: brass-worker-ingest
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: brass-frontend-hpa
  namespace: brass-export
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: brass-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
