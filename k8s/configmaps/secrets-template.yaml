# DO NOT commit actual secrets. Use this as a template.
# Create secrets with:
#   kubectl create secret generic brass-secrets \
#     --from-literal=DATABASE_URL="postgresql+asyncpg://..." \
#     --from-literal=SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=REDIS_PASSWORD="..." \
#     --from-literal=GOOGLE_CLIENT_ID="..." \
#     --from-literal=GOOGLE_CLIENT_SECRET="..." \
#     --from-literal=AWS_ACCESS_KEY_ID="..." \
#     --from-literal=AWS_SECRET_ACCESS_KEY="..." \
#     --namespace=brass-export
apiVersion: v1
kind: Secret
metadata:
  name: brass-secrets
  namespace: brass-export
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://brass:CHANGE_ME@postgres:5432/brass_export"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379/0"
  CELERY_BROKER_URL: "redis://:CHANGE_ME@redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://:CHANGE_ME@redis:6379/2"
  REDIS_PASSWORD: "CHANGE_ME"
  SECRET_KEY: "CHANGE_ME_openssl_rand_hex_32"
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  GRAFANA_PASSWORD: "CHANGE_ME"
  FLOWER_PASSWORD: "CHANGE_ME"
