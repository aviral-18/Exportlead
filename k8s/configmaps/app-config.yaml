apiVersion: v1
kind: ConfigMap
metadata:
  name: brass-app-config
  namespace: brass-export
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  POSTGRES_DB: "brass_export"
  POSTGRES_USER: "brass"
  CORS_ORIGINS: "https://app.brassexport.ai,https://www.brassexport.ai"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "40"
  BATCH_SIZE: "1000"
  HEADLESS: "true"
  REQUESTS_PER_SECOND: "2.0"
