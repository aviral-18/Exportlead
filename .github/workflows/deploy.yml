name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/brass-export

jobs:
  # ── Run migrations before deploying ──────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

  # ── Deploy to Kubernetes ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: migrate
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy API
        run: |
          kubectl set image deployment/brass-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ steps.tag.outputs.tag }} \
            -n brass-export
          kubectl rollout status deployment/brass-api -n brass-export --timeout=300s

      - name: Deploy Workers
        run: |
          kubectl set image deployment/brass-worker-ingest \
            worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.tag }} \
            -n brass-export
          kubectl set image deployment/brass-worker-pipeline \
            worker=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.tag }} \
            -n brass-export
          kubectl set image deployment/brass-beat \
            beat=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.tag }} \
            -n brass-export
          kubectl rollout status deployment/brass-worker-ingest -n brass-export --timeout=300s
          kubectl rollout status deployment/brass-worker-pipeline -n brass-export --timeout=300s

      - name: Deploy Frontend
        run: |
          kubectl set image deployment/brass-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.tag }} \
            -n brass-export
          kubectl rollout status deployment/brass-frontend -n brass-export --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n brass-export
          kubectl get ingress -n brass-export

      - name: Smoke test
        run: |
          API_URL="${{ vars.API_URL || 'https://api.brassexport.ai' }}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed: HTTP $STATUS"

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          fields: repo,message,commit,author,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ── Post-deploy E2E smoke tests ───────────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: API health
        run: |
          curl -sf ${{ vars.API_URL || 'https://api.brassexport.ai' }}/health | jq .

      - name: API docs accessible
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "${{ vars.API_URL || 'https://api.brassexport.ai' }}/docs" || echo "000")
          [ "$STATUS" = "200" ] && echo "Docs OK" || (echo "Docs failed: $STATUS" && exit 1)

      - name: Frontend accessible
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "${{ vars.APP_URL || 'https://app.brassexport.ai' }}/" || echo "000")
          [ "$STATUS" = "200" ] && echo "Frontend OK" || (echo "Frontend failed: $STATUS" && exit 1)
