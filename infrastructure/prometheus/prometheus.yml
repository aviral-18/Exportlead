global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'brass-export-intelligence'
    environment: 'production'

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'brass-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'brass-worker-ingest'
    static_configs:
      - targets: ['worker-ingest:9691']
    metrics_path: /metrics

  - job_name: 'brass-worker-pipeline'
    static_configs:
      - targets: ['worker-pipeline:9691']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    metrics_path: /_prometheus/metrics

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'celery-flower'
    static_configs:
      - targets: ['flower:5555']
    metrics_path: /metrics

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
